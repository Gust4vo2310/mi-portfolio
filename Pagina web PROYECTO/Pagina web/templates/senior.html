<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset=""UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Senior - Villa Garibaldi </title>

    <link href=""https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body {
            background-image: linear-gradient(rgba(0, 10, 30, 0.85), rgba(0, 10, 30, 0.95)), url("{{ url_for('static', filename='fondo_cancha.jpg') }}");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
            font-family: 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
        }

        .contenedor-tecnico {
            background-color: rgba(0,20,45,0.7);
            border: 1px solid rgba(255, 49, 49, 0.3);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            padding: 40px;
            margin-top: 50px;
        }

        .item-tecnico {
            font-size: 1.2rem;
            margin-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 10px;
        }

        .cargo {
            font-weight: 800;
            color: #ff3131;
            text-transform: uppercase;
            margin-right: 10px;
        }

        .nombre {
            font-weight: 400;
            color: #ffffff;
        }

        .btn-volver {
            color: white;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-volver:hover {
            color: #ff3131;
        }

        /* ESTA REGLA VA A FORZAR EL CENTRADO DEL BOTÓN SI O SI */
        .boton-centrado-ig {
            display: block !important;
            width: fit-content !important;
            margin: 30px auto 0 auto !important;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container py-5">
        <a href="/" class="btn-volver">
            <i class="fas fa-arrow-left me-2"></i> 
            Volver a Inicio
        </a>
    
    </div class="row justify-content-center">
        <div class="col-md-8">
            <div class="contenedor-tecnico shadow-lg">
                <div class="text-center mb-5">
                    <i class="fas fa-futbol fa-3x mb-3" style="color:white;"></i>
                    <h1 class="display-4 fw-bold">SENIOR</h1>
                </div>

                <div class="item-tecnico">
                    <span class="cargo">Director Técnico:</span>
                    <span class="nombre">---</span>
                </div>

                <div class="item-tecnico">
                    <span class="cargo">Ayudante de Campo:</span>
                    <span class="nombre">---</span>
                </div>

                <div class="item-tecnico">
                    <span class="cargo">Preparador Físico:</span>
                    <span class="nombre">---</span>
                </div>

                <div class="item-tecnico">
                    <span class="cargo">Entrenador de Arqueros:</span>
                    <span class="nombre">---</span>
                </div>

                <a href="https://www.instagram.com/seniorvillagaribaldi/" 
                   target="_blank" 
                   class="btn btn-outline-light py-3 px-4 boton-centrado-ig" 
                   style="border-radius: 12px; border-color: #E1306C; border-width: 2px; text-decoration: none; color: white;">
                    <i class="fab fa-instagram me-2" style="color: #E1306C;"></i> 
                    SEGUÍ AL SENIOR EN INSTAGRAM
                </a>

            </div>
        </div>
    </div>
</body>
</html>
