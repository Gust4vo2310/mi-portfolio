<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería - Villa Garibaldi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body {
            /* Mismo fondo que el resto de la página para mantener la estética */
            background-image: linear-gradient(rgba(0, 10, 30, 0.85), rgba(0, 10, 30, 0.95)), url("{{ url_for('static', filename='fondo_cancha.jpg') }}");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
            font-family: 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
        }

        .contenedor-galeria {
            background-color: rgba(0,20,45,0.7);
            border: 1px solid rgba(255, 49, 49, 0.3);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            padding: 40px;
            margin-top: 30px;
        }

        /* Estilo de las fotos: se cortan parejo y tienen efecto al pasar el mouse */
        .foto-galeria {
            width: 100%;
            height: 250px;
            object-fit: cover; /* Esto hace que la foto no se deforme */
            border-radius: 12px;
            border: 2px solid rgba(255, 49, 49, 0.2);
            transition: 0.3s;
            cursor: pointer;
        }

        .foto-galeria:hover {
            transform: scale(1.05);
            border-color: #ff3131;
        }

        .btn-volver {
            color: white;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-volver:hover { color: #ff3131; }
    </style>
</head>
<body>
    <div class="container py-5">
        <a href="/" class="btn-volver">
            <i class="fas fa-arrow-left me-2"></i> Volver a Inicio
        </a>

        <div class="contenedor-galeria shadow-lg">
            <div class="text-center mb-5">
                <i class="fas fa-camera-retro fa-3x mb-3" style="color:white;"></i>
                <h1 class="display-4 fw-bold">MOMENTOS</h1>
                <p class="lead">Nuestra historia, nuestra gente, nuestra pasión.</p>
            </div>

            <div class="row g-4">
                
                <div class="col-md-4 col-sm-6">
                    <img src="https://via.placeholder.com/600x400?text=Subir+Foto+1+Aqui" class="foto-galeria" alt="Espacio para foto">
                </div>

                <div class="col-md-4 col-sm-6">
                    <img src="https://via.placeholder.com/600x400?text=Subir+Foto+2+Aqui" class="foto-galeria" alt="Momento Villa">
                </div>

                <div class="col-md-4 col-sm-6">
                    <img src="https://via.placeholder.com/600x400?text=Subir+Foto+3+Aqui" class="foto-galeria" alt="Momento Villa">
                </div>

                <div class="col-md-4 col-sm-6">
                    <img src="https://via.placeholder.com/600x400?text=Subir+Foto+4+Aqui" class="foto-galeria" alt="Momento Villa">
                </div>

                <div class="col-md-4 col-sm-6">
                    <img src="https://via.placeholder.com/600x400?text=Subir+Foto+5+Aqui" class="foto-galeria" alt="Momento Villa">
                </div>

                <div class="col-md-4 col-sm-6">
                    <img src="https://via.placeholder.com/600x400?text=Subir+Foto+6+Aqui" class="foto-galeria" alt="Momento Villa">
                </div>

            </div>
        </div>
    </div>
</body>
</html>
