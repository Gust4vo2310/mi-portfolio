<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset=""UTF-8">
    <meta name="viewport"
content="width=device-width, initial-scale=1.0">
    <title>Reserva - Villa Garibaldi </title>

    <link href=""https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body {
            /* Usamos el mismo fondo que en index.html para mantener la coherencia visual */
            background-image: linear-gradient(rgba(0, 10, 30, 0.85), rgba(0, 10, 30, 0.95)), url("{{ url_for('static', filename='fondo_cancha.jpg') }}");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
            font-family: 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
        }

        /* Cuadro central donde va la informacion de cuerpo tecnico */
        .contenedor-tecnico {
            background-color: rgba(0,20,45,0.7);
            /*Fondo azul oscuro transparente */
            border: 1px solid rgba(255, 49, 49, 0.3);
            /*Borde rojo sutil */
            border-radius: 20px;
            backdrop-filter: blur(10px);
            /*Efecto de vidrio */
            padding: 40px;
            margin-top: 50px;
        }

        /*Estilo para caada renglon(dt,pf,etc) */
        .item-tecnico {
            font-size: 1.2 rem;
            margin-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            /*linea divisoria finita */
            padding-bottom: 10px;
        }

        /*Color para el cargo (dt,etc) */
        .cargo {
            font-weight: 800;
            color: #ff3131; /*Rojo*/
            text-transform: uppercase;
            margin-right: 10px;
        }

        /*Color para el nombre de la persona */
        .nombre {
            font-weight: 400;
            color: #ffffff; /*Blanco*/
        }

        /* Estilo para el boton de volver */
        .btn-volver {
            color: white;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-volver:hover {
            color: #ff3131; /*cambia a color rojo al pasar el mouse */
        }
    </style>
</head>
<body>
    <div class="container py-5">
        <a href="/" class="btn-volver">
            <i class="fas fa-arrow-left me-2"></i> 
            Volver a Inicio
        </a>
    
    </div class="row justify-content-center">
        <div class="col-md-8">
            <div class="contenedor-tecnico shadow-lg">
                <div class="text-center mb-5">
                    <i class="fas fa-futbol fa-3x mb-3" style="color:white;"></i>
                    <h1 class="display-4 fw-bold">CUARTA DIVISION</h1>
                </div>

                <div class="item-tecnico">
                    <span class="cargo">Director Técnico:</span>
                    <span class="nombre">---</span>
                </div>

                <div class="item-tecnico">
                    <span class="cargo">Ayudante de Campo:</span>
                    <span class="nombre">---</span>
                </div>

                <div class="item-tecnico">
                    <span class="cargo">Preparador Físico:</span>
                    <span class="nombre">---</span>
                </div>

                <div class="item-tecnico">
                    <span class="cargo">Entrenador de Arqueros:</span>
                    <span class="nombre">---</span>
                </div>

            </div>
        </div>
    </div>

</body>
</html>
